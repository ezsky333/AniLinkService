databaseChangeLog:
  - changeSet:
      id: create-api-cache-table
      author: anilink
      description: "Create third-party API cache table"
      changes:
        - createTable:
            tableName: api_cache
            remarks: "第三方API缓存表"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  remarks: "主键"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cache_key
                  type: VARCHAR(255)
                  remarks: "缓存键（唯一标识某个接口及其参数）"
                  constraints:
                    nullable: false
              - column:
                  name: cache_value
                  type: TEXT
                  remarks: "缓存内容（JSON格式）"
                  constraints:
                    nullable: false
              - column:
                  name: expire_time
                  type: TIMESTAMP
                  remarks: "过期时间"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  remarks: "创建时间"
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  remarks: "更新时间"
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: api_cache
            columnNames: cache_key
            constraintName: uniq_cache_key
        - createIndex:
            tableName: api_cache
            indexName: idx_api_cache_expire_time
            columns:
              - column:
                  name: expire_time
