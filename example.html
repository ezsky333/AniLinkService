                <div class="tabs" id="episodeTabs">
                    <button class="tab-btn active" data-type="main">正片</button>
                    <button class="tab-btn" data-type="special">特典/短片</button>
                    <button class="tab-btn" data-type="all">全部</button>
                </div>
                <span class="episode-count">共${data.episodes.length}集 (主线${mainEpisodes.length})</span>
            </div>
            <div class="episode-list" id="episodeListContainer">
                ${renderEpisodes('main')}
            </div>
        </div>

        <!-- 预告片 -->
        <h3 style="margin: 24px 0 10px; font-weight: 600;"><i class="fa-regular fa-clapperboard"></i> 预告片</h3>
        <div class="trailer-row">
            ${data.trailers.map(t => `
                <div class="trailer-card">
                    <img src="${t.imageUrl}" alt="${t.title}" loading="lazy">
                    <div class="trailer-info">
                        <div class="trailer-title">${t.title}</div>
                        <div class="trailer-date">${t.date}</div>
                    </div>
                </div>
            `).join('')}
        </div>

        <!-- 相关作品 -->
        <h3 style="margin: 24px 0 10px;">相关作品</h3>
        <div class="related-grid">
            ${data.relateds.map(r => `
                <div class="related-card">
                    <img src="${r.imageUrl}" alt="${r.animeTitle}">
                    <div class="related-info">
                        <h4>${r.animeTitle}</h4>
                        <span class="rating">⭐ ${r.rating}</span>
                    </div>
                </div>
            `).join('')}
        </div>

        <!-- 外部链接 -->
        <div class="external-links">
            ${data.onlineDatabases.map(db => `
                <a class="external-link" href="${db.url}" target="_blank" rel="noopener"><i class="fa-regular fa-link"></i> ${db.name}</a>
            `).join('')}
        </div>

        <div class="copyright">
            ${copyright}
        </div>
    `;

    const app = document.getElementById('app');
    app.innerHTML = html;

    // 选项卡切换逻辑
    const tabs = document.querySelectorAll('.tab-btn');
    const container = document.getElementById('episodeListContainer');
    tabs.forEach(btn => {
        btn.addEventListener('click', function(e) {
            tabs.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const type = this.dataset.type;
            let episodesHtml = '';
            if (type === 'main') episodesHtml = renderEpisodes('main');
            else if (type === 'special') episodesHtml = renderEpisodes('special');
            else if (type === 'all') episodesHtml = renderEpisodes('all');
            container.innerHTML = episodesHtml;
        });
    });

})();
</script>
<!-- 说明：所有点击按钮均为静态展示，无实际跳转；收藏按钮仅作样式。 -->
</body>
</html>
